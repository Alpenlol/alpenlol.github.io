<div id="terminal-overlay" class="terminal-hidden">
  <div id="terminal-window">
    <div class="terminal-titlebar">
      <div class="terminal-dots">
        <span class="terminal-dot dot-close" id="terminal-close"></span>
        <span class="terminal-dot dot-min"></span>
        <span class="terminal-dot dot-max"></span>
      </div>
      <span class="terminal-title">root@alpenlol:~</span>
    </div>
    <div id="terminal-output"></div>
    <div class="terminal-input-line">
      <span class="terminal-prompt">root@alpenlol:~$&nbsp;</span>
      <input id="terminal-input" type="text" autocomplete="off" spellcheck="false">
    </div>
  </div>
</div>
